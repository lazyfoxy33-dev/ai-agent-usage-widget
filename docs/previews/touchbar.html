<!doctype html><html><head><meta charset="utf-8"><style>
  /* Touch Bar preview — matches ProviderGauge: black strip, one brand-tinted cell
     per provider (letter badge + 5H/Wk mini bars), brighten-emphasis on the dark
     bar, soonest reset at the right. */
  html,body{margin:0;padding:0;width:660px;height:96px;overflow:hidden}
  body{display:flex;align-items:center;justify-content:center;
    background:linear-gradient(180deg,#23252b,#15171b);
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text",sans-serif;font-feature-settings:"tnum"}
  .bar{display:flex;align-items:center;height:48px;background:#000;border-radius:10px;
    padding:0 14px;gap:10px;box-shadow:0 6px 18px -4px rgba(0,0,0,.6)}
  .cell{display:flex;align-items:center;gap:9px;padding:0 12px;height:38px;
    border-radius:8px}
  .badge{width:22px;height:22px;border-radius:6px;display:flex;align-items:center;
    justify-content:center;color:#111;font-weight:800;font-size:12px;flex:none}
  .gauge{display:flex;flex-direction:column;gap:5px}
  .grow{display:flex;align-items:center;gap:7px}
  .mlbl{font-size:8px;font-weight:600;color:rgba(255,255,255,.55);width:15px;text-align:right}
  .track{width:54px;height:4px;border-radius:2px;background:rgba(255,255,255,.16);overflow:hidden}
  .fill{height:100%;border-radius:2px;min-width:4px}
  .mval{font-size:12px;font-weight:600;font-variant-numeric:tabular-nums;width:30px}
  .reset{margin-left:6px;display:flex;align-items:center;gap:4px;color:rgba(255,255,255,.92);font-size:13px}
  .reset .g{color:rgba(255,255,255,.55)}
</style></head><body>
  <div class="bar">
    <!-- Claude: Wk 91% brightens to the urgent tint -->
    <div class="cell" style="background:rgba(217,119,87,.08);box-shadow:inset 0 0 0 .6px rgba(217,119,87,.22)">
      <span class="badge" style="background:#D97757">C</span>
      <div class="gauge">
        <div class="grow"><span class="mlbl">5H</span><span class="track"><span class="fill" style="width:47%;background:#D97757"></span></span><span class="mval" style="color:#D97757">47%</span></div>
        <div class="grow"><span class="mlbl">Wk</span><span class="track"><span class="fill" style="width:91%;background:#E7AB97"></span></span><span class="mval" style="color:#E7AB97">91%</span></div>
      </div>
    </div>
    <!-- Codex -->
    <div class="cell" style="background:rgba(123,131,245,.08);box-shadow:inset 0 0 0 .6px rgba(123,131,245,.22)">
      <span class="badge" style="background:#7B83F5">X</span>
      <div class="gauge">
        <div class="grow"><span class="mlbl">5H</span><span class="track"><span class="fill" style="width:4%;background:#7B83F5"></span></span><span class="mval" style="color:#7B83F5">4%</span></div>
        <div class="grow"><span class="mlbl">Wk</span><span class="track"><span class="fill" style="width:1%;background:#7B83F5"></span></span><span class="mval" style="color:#7B83F5">1%</span></div>
      </div>
    </div>
    <!-- Kimi -->
    <div class="cell" style="background:rgba(46,139,255,.08);box-shadow:inset 0 0 0 .6px rgba(46,139,255,.22)">
      <span class="badge" style="background:#2E8BFF">K</span>
      <div class="gauge">
        <div class="grow"><span class="mlbl">5H</span><span class="track"><span class="fill" style="width:1%;background:#2E8BFF"></span></span><span class="mval" style="color:#2E8BFF">1%</span></div>
        <div class="grow"><span class="mlbl">Wk</span><span class="track"><span class="fill" style="width:1%;background:#2E8BFF"></span></span><span class="mval" style="color:#2E8BFF">1%</span></div>
      </div>
    </div>
    <span class="reset"><span class="g">⟳</span>3h34m</span>
  </div>
</body></html>
