name: Bug report
description: Report a reproducible problem with the widget
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Do not include tokens, Keychain exports, session files, or personal paths.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened, and what did you expect?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      placeholder: |
        1. Install...
        2. Run...
        3. Observe...
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS version
    validations:
      required: true
  - type: input
    id: ubersicht
    attributes:
      label: Übersicht version
    validations:
      required: true
  - type: dropdown
    id: provider
    attributes:
      label: Affected provider
      options:
        - Claude
        - Codex
        - Both
        - Widget UI only
    validations:
      required: true
  - type: textarea
    id: output
    attributes:
      label: Sanitized output
      description: |
        Optional. Remove tokens, usernames, personal paths, and session contents
        before pasting output from fetch_usage.py.
      render: shell
  - type: checkboxes
    id: safety
    attributes:
      label: Privacy check
      options:
        - label: I have removed credentials and personal information.
          required: true
