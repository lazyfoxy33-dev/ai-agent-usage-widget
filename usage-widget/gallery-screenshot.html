<!doctype html><html><head><meta charset="utf-8"><style>
  html,body{margin:0;padding:0;width:516px;height:320px;overflow:hidden}
  body{display:flex;align-items:center;justify-content:center;
    background:linear-gradient(135deg,#3b6ea5 0%,#2a4a6b 55%,#20364f 100%);
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text",sans-serif;font-feature-settings:"tnum"}
  /* New Claude Design iteration, light theme: subtle brand tints, single brand hue per
     provider with semantic emphasis by used %, two-letter codes, inline reset per row. */
  .widget{width:300px;border-radius:22px;overflow:hidden;transform:scale(.72);
    box-shadow:0 20px 44px -12px rgba(0,0,0,.6),0 2px 6px rgba(0,0,0,.3)}
  .panel{display:flex;align-items:center;gap:17px;padding:17px 18px 16px;color:#26231F}
  .ringwrap{width:88px;height:88px;position:relative;flex:none}
  .ringtxt{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;line-height:1;transform:translateY(-1px)}
  .pct{font-size:18px;font-weight:720;letter-spacing:-.5px}
  .h5{font-size:8px;margin-top:3px;letter-spacing:.5px;font-weight:600;color:#9a9286}
  .body{flex:1;min-width:0;display:flex;flex-direction:column;gap:11px}
  .hdr{display:flex;align-items:center;gap:8px}
  .ico{width:27px;height:27px;border-radius:7px;object-fit:contain;flex:none}
  .name{font-size:15px;font-weight:650}
  .rows{display:flex;flex-direction:column;gap:9px}
  .row{display:flex;align-items:center;gap:7px}
  .dot{width:9px;height:9px;border-radius:50%;flex:none}
  .lbl{font-size:12px;font-weight:600}
  .rst{margin-left:auto;font-size:10.5px;color:#9a9286;white-space:nowrap;display:flex;align-items:center;gap:3px}
  .rr{font-size:10px;opacity:.75}
  .val{margin-left:8px;font-size:13px;font-weight:700;min-width:34px;text-align:right}
  .div{height:1px;background:rgba(0,0,0,.06)}
</style></head><body>
<div class="widget">

  <!-- Claude — Weekly 91% shows the urgent (deepened) color -->
  <div class="panel" style="background:#FAF7F3">
    <div class="ringwrap">
      <svg width="88" height="88" viewBox="0 0 88 88" style="transform:rotate(-90deg)">
        <circle cx="44" cy="44" r="38" fill="none" stroke="rgba(0,0,0,.09)" stroke-width="6.5"/>
        <circle cx="44" cy="44" r="38" fill="none" stroke="#98533D" stroke-width="6.5" stroke-linecap="round" stroke-dasharray="238.76" stroke-dashoffset="21.5"/>
        <circle cx="44" cy="44" r="27" fill="none" stroke="rgba(0,0,0,.09)" stroke-width="6.5"/>
        <circle cx="44" cy="44" r="27" fill="none" stroke="#D97757" stroke-width="6.5" stroke-linecap="round" stroke-dasharray="169.65" stroke-dashoffset="89.9"/>
      </svg>
      <div class="ringtxt"><span class="pct" style="color:#98533D">91%</span><span class="h5">WK</span></div>
    </div>
    <div class="body">
      <div class="hdr"><img class="ico" src="assets/claude-app.png"><span class="name">Claude</span></div>
      <div class="rows">
        <div class="row"><span class="dot" style="background:#D97757"></span><span class="lbl">5H</span><span class="rst"><span class="rr">↻</span>3h 34m</span><span class="val" style="color:#D97757">47%</span></div>
        <div class="row"><span class="dot" style="background:#98533D"></span><span class="lbl">Wk</span><span class="rst"><span class="rr">↻</span>4d 12h</span><span class="val" style="color:#98533D">91%</span></div>
      </div>
    </div>
  </div>
  <div class="div"></div>

  <!-- Codex — subtle light tint (no longer a dark card), accent #7B83F5, no gradient -->
  <div class="panel" style="background:#F6F6FB">
    <div class="ringwrap">
      <svg width="88" height="88" viewBox="0 0 88 88" style="transform:rotate(-90deg)">
        <circle cx="44" cy="44" r="38" fill="none" stroke="rgba(0,0,0,.09)" stroke-width="6.5"/>
        <circle cx="44" cy="44" r="38" fill="none" stroke="#7B83F5" stroke-width="6.5" stroke-linecap="round" stroke-dasharray="238.76" stroke-dashoffset="236.4"/>
        <circle cx="44" cy="44" r="27" fill="none" stroke="rgba(0,0,0,.09)" stroke-width="6.5"/>
        <circle cx="44" cy="44" r="27" fill="none" stroke="#7B83F5" stroke-width="6.5" stroke-linecap="round" stroke-dasharray="169.65" stroke-dashoffset="162.9"/>
      </svg>
      <div class="ringtxt"><span class="pct" style="color:#7B83F5">4%</span><span class="h5">5H</span></div>
    </div>
    <div class="body">
      <div class="hdr"><img class="ico" src="assets/codex-app.png"><span class="name">Codex</span></div>
      <div class="rows">
        <div class="row"><span class="dot" style="background:#7B83F5"></span><span class="lbl">5H</span><span class="rst"><span class="rr">↻</span>3h 41m</span><span class="val" style="color:#7B83F5">4%</span></div>
        <div class="row"><span class="dot" style="background:#7B83F5"></span><span class="lbl">Wk</span><span class="rst"><span class="rr">↻</span>6d 22h</span><span class="val" style="color:#7B83F5">1%</span></div>
      </div>
    </div>
  </div>
  <div class="div"></div>

  <!-- Kimi -->
  <div class="panel" style="background:#F4F7FC">
    <div class="ringwrap">
      <svg width="88" height="88" viewBox="0 0 88 88" style="transform:rotate(-90deg)">
        <circle cx="44" cy="44" r="38" fill="none" stroke="rgba(0,0,0,.09)" stroke-width="6.5"/>
        <circle cx="44" cy="44" r="38" fill="none" stroke="#1478FF" stroke-width="6.5" stroke-linecap="round" stroke-dasharray="238.76" stroke-dashoffset="236.4"/>
        <circle cx="44" cy="44" r="27" fill="none" stroke="rgba(0,0,0,.09)" stroke-width="6.5"/>
        <circle cx="44" cy="44" r="27" fill="none" stroke="#1478FF" stroke-width="6.5" stroke-linecap="round" stroke-dasharray="169.65" stroke-dashoffset="168.0"/>
      </svg>
      <div class="ringtxt"><span class="pct" style="color:#1478FF">1%</span><span class="h5">5H</span></div>
    </div>
    <div class="body">
      <div class="hdr"><img class="ico" src="assets/kimi-code.png"><span class="name">Kimi Code</span></div>
      <div class="rows">
        <div class="row"><span class="dot" style="background:#1478FF"></span><span class="lbl">5H</span><span class="rst"><span class="rr">↻</span>4h 37m</span><span class="val" style="color:#1478FF">1%</span></div>
        <div class="row"><span class="dot" style="background:#1478FF"></span><span class="lbl">Wk</span><span class="rst"><span class="rr">↻</span>6d 6h</span><span class="val" style="color:#1478FF">1%</span></div>
      </div>
    </div>
  </div>

</div>
</body></html>
